name: Docker

on:
  # ------------------------------------------------------------
  # Triggers
  # ------------------------------------------------------------
  # • Push to `test` – builds the image and tags it as `latest`.
  # • Push to `release` – builds the image and tags it with the
  #   version tag (e.g. v1.2.3) generated by the metadata action.
  # • Tag push matching `v*.*.*` – also treated as a release build.
  #   (In practice tags are created from the `release` branch.)
  push:
    branches: [ "test", "release" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    # Keep PR builds on the `release` branch for review purposes
    branches: [ "release" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.1.1
        with:
          cosign-release: 'v2.1.1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Use the `latest` tag only for release builds. For the `test` branch we push the image with the `latest` tag explicitly in the step below.
          flavor: |
            latest=${{ github.ref != 'refs/heads/test' }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          # For the `test` branch we always push the image with the `latest` tag.
          # For release builds we use the automatically generated tags from the metadata action.
          tags: ${{ github.ref == 'refs/heads/test' && 'latest' || steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          labels: ${{ steps.meta.outputs.labels }}
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

